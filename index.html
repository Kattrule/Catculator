<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catculator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #ffffff;
            --btn-num: #475569;
            --accent: #38bdf8;
            --btn-op: #1e293b;
            --equal-bg: #10b981;
            --text-muted: #94a3b8;
        }

        * { color: var(--text-color); font-family: Arial, sans-serif; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-color); overflow: hidden; }
        .calculator { display: flex; flex-direction: column; height: 100%; width: 100%; }
        
        .top-bar { display: flex; gap: 5px; padding: 10px; background: var(--panel-bg); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .top-btn { background: rgba(255,255,255,0.1); border: none; color: var(--accent) !important; padding: 10px 5px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; }
        .top-btn.active { background: var(--accent); color: var(--bg-color) !important; }

        .display-container { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; background: var(--bg-color); }
        .display-main { width: 100%; background: transparent; border: none; font-size: 3rem; text-align: right; outline: none; caret-color: var(--accent); padding: 0; }
        .result-preview { text-align: right; color: var(--accent) !important; opacity: 0.7; font-size: 1.4rem; min-height: 1.6rem; margin-top: 5px; }

        .keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; background: var(--bg-color); flex: 2.5; }
        button { border: none; font-size: 1.6rem; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.1s; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        
        .num-btn { background: var(--btn-num); } 
        .operator { color: var(--accent) !important; background: var(--btn-op); }
        .clear-btn { color: #ef4444 !important; background: var(--btn-op); }
        .equal-btn { background: var(--equal-bg); color: #000 !important; font-weight: bold; }

        .conv-area { display: none; flex-direction: column; gap: 15px; padding: 15px; background: var(--bg-color); flex: 2.5; overflow-y: auto; }
        .conv-row { display: flex; gap: 10px; align-items: center; justify-content: space-between; }
        .conv-input, .conv-select { flex: 1; padding: 15px; font-size: 1.2rem; background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; outline: none; }
        .conv-res-btn { background: var(--equal-bg); color: #000 !important; padding: 20px; text-align: center; border-radius: 10px; font-size: 1.4rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .conv-op-btn { background: var(--btn-op); color: var(--accent) !important; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; height: 50px; flex: 1; }
        .fetch-btn { background: var(--accent); color: var(--bg-color) !important; font-size: 1rem; padding: 15px; flex: 0.8; border: none; border-radius: 8px; font-weight: bold; }

        .panel { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 100; flex-direction: column; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--panel-bg); }
        
        .design-row { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 12px; }
        .design-ui-group { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; }
        .design-select { flex: 1; padding: 12px; background: var(--panel-bg); border-radius: 8px; border: 1px solid var(--accent); font-size: 1rem; }
        .color-input { width: 50px; height: 50px; border: 2px solid var(--text-color); border-radius: 8px; cursor: pointer; background: none; padding: 0; overflow: hidden; flex-shrink: 0; }
        .hex-input { width: 100px; padding: 12px; background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; text-align: center; font-family: monospace; font-size: 1rem; text-transform: uppercase; }
        
        .recent-colors { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 5px; }
        .color-swatch { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: 0.2s; }

        .custom-item { background: var(--panel-bg); padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .del-btn { background: #ef4444; color: white !important; font-size: 1rem; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="top-bar">
        <button id="advToggleBtn" class="top-btn" onclick="toggleAdvanced()">Avancerat</button>
        <button class="top-btn" onclick="toggleConverter()">Konv</button>
        <button class="top-btn" onclick="togglePanel('histPanel')">Hist</button>
        <button class="top-btn" onclick="togglePanel('designPanel')">⚙️</button>
    </div>

    <div class="display-container">
        <input type="text" id="mainDisplay" class="display-main" placeholder="0" inputmode="none" autofocus>
        <div class="result-preview" id="preview"></div>
    </div>

    <div class="keys" id="mainKeys">
        <button class="clear-btn" onclick="clearDisplay()">C</button>
        <button id="op-1" class="operator" onclick="insertAtCursor(' % ')">%</button>
        <button class="operator" onclick="insertSmartParenthesis()">( )</button>
        <button id="op-2" class="operator" onclick="insertAtCursor('/')">÷</button>
        <button class="num-btn" onclick="insertAtCursor('7')">7</button>
        <button class="num-btn" onclick="insertAtCursor('8')">8</button>
        <button class="num-btn" onclick="insertAtCursor('9')">9</button>
        <button id="op-3" class="operator" onclick="insertAtCursor('*')">×</button>
        <button class="num-btn" onclick="insertAtCursor('4')">4</button>
        <button class="num-btn" onclick="insertAtCursor('5')">5</button>
        <button class="num-btn" onclick="insertAtCursor('6')">6</button>
        <button id="op-4" class="operator" onclick="insertAtCursor('-')">-</button>
        <button class="num-btn" onclick="insertAtCursor('1')">1</button>
        <button class="num-btn" onclick="insertAtCursor('2')">2</button>
        <button class="num-btn" onclick="insertAtCursor('3')">3</button>
        <button id="op-5" class="operator" onclick="insertAtCursor('+')">+</button>
        <button class="num-btn" onclick="insertAtCursor('.')">.</button>
        <button class="num-btn" onclick="insertAtCursor('0')">0</button>
        <button class="num-btn" onclick="deleteAtCursor()">DEL</button>
        <button class="equal-btn" onclick="calculate()">=</button>
    </div>

    <div class="conv-area" id="convArea">
        <div class="conv-row"><select id="convFrom" class="conv-select" onchange="updateConvTo()"></select><span style="font-size:1.5rem;">➔</span><select id="convTo" class="conv-select" onchange="runConv()"></select></div>
        <div class="conv-row"><input type="number" id="convInput" class="conv-input" placeholder="Värde..." oninput="runConv()"><button class="fetch-btn" onclick="grabFromDisplay()">Hämta</button></div>
        <div id="convResBtn" class="conv-res-btn" onclick="pasteConv()">Resultat: 0</div>
        <div style="display: flex; gap: 8px; margin-top: 10px;">
            <button class="conv-op-btn" onclick="pasteAndOp('+')">+</button><button class="conv-op-btn" onclick="pasteAndOp('-')">-</button><button class="conv-op-btn" onclick="pasteAndOp('*')">×</button><button class="conv-op-btn" onclick="pasteAndOp('/')">÷</button><button class="conv-op-btn equal-btn" onclick="pasteAndCalc()">=</button>
        </div>
        <button class="top-btn" onclick="togglePanel('customPanel')" style="margin-top:15px; padding:15px; background: rgba(255,255,255,0.05); color: var(--text-color) !important;">+ Skapa egen formel</button>
        <button class="top-btn" onclick="toggleConverter()" style="margin-top:5px; padding:15px;">Stäng</button>
    </div>
</div>

<div class="panel" id="histPanel">
    <div class="panel-header"><h2>Historik</h2><button class="top-btn" onclick="togglePanel('histPanel')">Stäng</button></div>
    <div id="historyList" style="flex:1; overflow-y:auto; padding:15px;"></div>
</div>

<div class="panel" id="designPanel">
    <div class="panel-header"><h2>Design 🎨</h2><button class="top-btn" onclick="togglePanel('designPanel')">Klar</button></div>
    <div class="design-row">
        <span>Välj del:</span>
        <select id="designTarget" class="design-select" onchange="syncDesignUI()">
            <option value="--bg-color">Bakgrund</option>
            <option value="--panel-bg">Toppmeny</option>
            <option value="--text-color">All Text</option>
            <option value="--btn-num">Sifferknappar</option>
            <option value="--btn-op">Operatörknappar</option>
            <option value="--accent">Accentfärg</option>
            <option value="--equal-bg">Lika med (=)</option>
        </select>
        <div class="design-ui-group">
            <input type="color" id="designColor" class="color-input" oninput="updateFromPicker(this.value)">
            <input type="text" id="designHex" class="hex-input" maxlength="7" oninput="updateFromHex(this.value)">
        </div>
    </div>
    <div class="design-row">
        <span>Senaste färger:</span>
        <div id="recentColors" class="recent-colors"></div>
    </div>
    <div style="padding:20px;"><button class="top-btn" style="background:#ef4444; color:white !important; width:100%; padding:15px;" onclick="resetDesign()">Återställ</button></div>
</div>

<div class="panel" id="customPanel">
    <div class="panel-header"><h2>Egna Formler</h2><button class="top-btn" onclick="togglePanel('customPanel')">Klar</button></div>
    <div style="padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto;">
        <p style="color: var(--text-muted); font-size: 0.9rem;">
            Använd <b>?</b> där du vill ha inmatat värde.<br>
            <i>Exempel: (1821 * ?) / 5000</i>
        </p>
        <input type="text" id="customName" class="conv-input" placeholder="Namn på formeln">
        <input type="text" id="customMath" class="conv-input" placeholder="Formel med ?">
        <button class="equal-btn" style="padding: 15px; border-radius: 8px;" onclick="saveCustomFormula()">Spara Formel</button>
        <div id="customList" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;"></div>
    </div>
</div>

<script>
    const input = document.getElementById('mainDisplay');
    const preview = document.getElementById('preview');
    let historyData = [];
    let recentColors = JSON.parse(localStorage.getItem('catcalc_recent')) || ['#38bdf8', '#10b981', '#ef4444', '#ffffff', '#0f172a', '#1e293b'];
    let customFormulas = JSON.parse(localStorage.getItem('catcalc_custom')) || {};

    // --- DESIGN ---
    const defaultDesign = {"--bg-color":"#0f172a","--panel-bg":"#1e293b","--text-color":"#ffffff","--btn-num":"#475569","--accent":"#38bdf8","--btn-op":"#1e293b","--equal-bg":"#10b981"};
    function syncDesignUI() {
        const target = document.getElementById('designTarget').value;
        let currentColor = getComputedStyle(document.documentElement).getPropertyValue(target).trim();
        const hex = anyToHex(currentColor);
        document.getElementById('designColor').value = hex;
        document.getElementById('designHex').value = hex;
        renderRecentColors();
    }
    function anyToHex(str) { const ctx = document.createElement('canvas').getContext('2d'); ctx.fillStyle = str; return ctx.fillStyle; }
    function updateFromPicker(val) { applyColor(val); document.getElementById('designHex').value = val; }
    function updateFromHex(val) { if(/^#[0-9A-F]{6}$/i.test(val)) { applyColor(val); document.getElementById('designColor').value = val; } }
    function applyColor(color) {
        document.documentElement.style.setProperty(document.getElementById('designTarget').value, color);
        saveDesign();
        addRecentColor(color);
    }
    function addRecentColor(color) {
        recentColors = [color.toLowerCase(), ...recentColors.filter(c => c.toLowerCase() !== color.toLowerCase())].slice(0, 8);
        localStorage.setItem('catcalc_recent', JSON.stringify(recentColors));
        renderRecentColors();
    }
    function renderRecentColors() {
        document.getElementById('recentColors').innerHTML = recentColors.map(c => `<div class="color-swatch" style="background:${c}" onclick="updateFromPicker('${c}')"></div>`).join('');
    }
    function saveDesign() {
        const current = {};
        for(let k in defaultDesign) current[k] = getComputedStyle(document.documentElement).getPropertyValue(k).trim();
        localStorage.setItem('catcalc_design', JSON.stringify(current));
    }
    function loadDesign() {
        const saved = localStorage.getItem('catcalc_design');
        if(saved) {
            const d = JSON.parse(saved);
            for(let k in d) document.documentElement.style.setProperty(k, d[k]);
        }
    }
    function resetDesign() {
        if(confirm("Nollställ?")) {
            for(let k in defaultDesign) document.documentElement.style.setProperty(k, defaultDesign[k]);
            localStorage.removeItem('catcalc_design');
            syncDesignUI();
        }
    }

    // --- KALKYLATOR LOGIK (MED FIXAD MARKÖR) ---
    function insertAtCursor(val) {
        const start = input.selectionStart || 0;
        input.value = input.value.substring(0, start) + val + input.value.substring(input.selectionEnd || 0);
        input.focus();
        input.selectionStart = input.selectionEnd = start + val.length;
        livePreview();
    }
    function deleteAtCursor() {
        const start = input.selectionStart || 0;
        if(start > 0) {
            input.value = input.value.substring(0, start-1) + input.value.substring(start);
            input.focus();
            input.selectionStart = input.selectionEnd = start-1;
        } else { input.focus(); }
        livePreview();
    }
    function clearDisplay() { input.value = ''; preview.innerText = ''; input.focus(); }
    function insertSmartParenthesis() {
        const before = input.value.substring(0, input.selectionStart);
        const open = (before.match(/\(/g) || []).length;
        const close = (before.match(/\)/g) || []).length;
        insertAtCursor(open > close && /[\d\)]/.test(before.trim().slice(-1)) ? ')' : '(');
    }
    function livePreview() {
        try {
            let math = input.value.replace(/×/g, '*').replace(/÷/g, '/');
            if(!math.trim()) { preview.innerText = ''; return; }
            let res = eval(math);
            if(res !== undefined && !isNaN(res)) preview.innerText = '= ' + parseFloat(res.toFixed(8));
        } catch(e) { preview.innerText = ''; }
    }
    function calculate() {
        try {
            if(!input.value) { input.focus(); return; }
            let math = input.value.replace(/×/g, '*').replace(/÷/g, '/');
            let res = eval(math);
            let formatted = parseFloat(res.toFixed(8)).toString();
            saveToHistory(input.value, formatted);
            input.value = formatted;
            preview.innerText = '';
            input.focus();
        } catch(e) { preview.innerText = 'Fel'; input.focus(); }
    }

    // --- KONVERTERARE & FORMLER ---
    const unitCat = { "km/h":"Hastighet","mph":"Hastighet","m/s":"Hastighet","cm":"Längd","tum":"Längd","meter":"Längd","Radie":"Cirkel","Diameter":"Cirkel","Omkrets":"Cirkel","Area":"Cirkel" };
    const unitRates = { "km/h":1, "mph":0.621371, "m/s":0.277778, "cm":1, "tum":0.393701, "meter":0.01 };
    let lastConvResult = "";
    function toggleConverter() {
        const keys = document.getElementById('mainKeys'), conv = document.getElementById('convArea');
        const isOpening = conv.style.display !== 'flex';
        keys.style.display = isOpening ? 'none' : 'grid';
        conv.style.display = isOpening ? 'flex' : 'none';
        if(isOpening) initConv();
    }
    function initConv() {
        const fromSel = document.getElementById('convFrom');
        fromSel.innerHTML = "";
        for(let u in unitCat) fromSel.add(new Option(u, u));
        for(let f in customFormulas) fromSel.add(new Option("⚙️ " + f, "custom_" + f));
        updateConvTo();
    }
    function updateConvTo() {
        const fromVal = document.getElementById('convFrom').value;
        const toSel = document.getElementById('convTo');
        toSel.innerHTML = "";
        if (fromVal.startsWith("custom_")) {
            toSel.add(new Option("Uträkning", "result"));
            toSel.disabled = true;
        } else {
            toSel.disabled = false;
            const targetCat = unitCat[fromVal];
            for(let u in unitCat) if(unitCat[u] === targetCat && u !== fromVal) toSel.add(new Option(u, u));
        }
        runConv();
    }
    function runConv() {
        let rawVal = document.getElementById('convInput').value.replace(',', '.');
        const v = parseFloat(rawVal);
        const from = document.getElementById('convFrom').value, to = document.getElementById('convTo').value;
        if(isNaN(v) || rawVal === "") { document.getElementById('convResBtn').innerText = "Resultat: 0"; return; }
        let res = 0;
        if (from.startsWith("custom_")) {
            const formula = customFormulas[from.replace("custom_", "")];
            try {
                let mathStr = formula.replace(/\?/g, "(" + v + ")").replace(/×/g, '*').replace(/÷/g, '/').replace(/,/g, '.');
                res = eval(mathStr);
                if(!isFinite(res) || isNaN(res)) throw new Error();
            } catch(e) { document.getElementById('convResBtn').innerText = "Fel i formel!"; return; }
        } else if(unitCat[from] === "Cirkel") {
            let r = from==='Radie'?v : from==='Diameter'?v/2 : from==='Omkrets'?v/(2*Math.PI) : Math.sqrt(v/Math.PI);
            res = to==='Radie'?r : to==='Diameter'?r*2 : to==='Omkrets'?2*Math.PI*r : Math.PI*r*r;
        } else { res = (v / unitRates[from]) * unitRates[to]; }
        lastConvResult = parseFloat(res.toFixed(5)).toString();
        document.getElementById('convResBtn').innerText = "Resultat: " + lastConvResult;
    }
    function saveCustomFormula() {
        const name = document.getElementById('customName').value.trim();
        const formula = document.getElementById('customMath').value.trim();
        if(!name || !formula || !formula.includes("?")) return alert("Fyll i namn och formel med '?'");
        customFormulas[name] = formula;
        localStorage.setItem('catcalc_custom', JSON.stringify(customFormulas));
        document.getElementById('customName').value = ''; document.getElementById('customMath').value = '';
        renderCustomList(); initConv();
    }
    function renderCustomList() {
        const list = document.getElementById('customList'); list.innerHTML = "";
        for(let fName in customFormulas) {
            list.innerHTML += `<div class="custom-item"><div><strong>${fName}</strong><br><small>${customFormulas[fName]}</small></div><button class="del-btn" onclick="deleteCustomFormula('${fName}')">Ta bort</button></div>`;
        }
    }
    function deleteCustomFormula(fName) {
        if(confirm(`Ta bort ${fName}?`)) { delete customFormulas[fName]; localStorage.setItem('catcalc_custom', JSON.stringify(customFormulas)); renderCustomList(); initConv(); }
    }
    function grabFromDisplay() { try { let res = eval(input.value.replace(/×/g, '*').replace(/÷/g, '/')); if(!isNaN(res)) { document.getElementById('convInput').value = res; runConv(); } } catch(e) {} }
    function pasteConv() { if(lastConvResult) { insertAtCursor(lastConvResult); toggleConverter(); } }
    function pasteAndOp(op) { if(lastConvResult) { insertAtCursor(lastConvResult + op); toggleConverter(); } }
    function pasteAndCalc() { if(lastConvResult) { insertAtCursor(lastConvResult); calculate(); toggleConverter(); } }

    // --- PANELER & HISTORIK ---
    function togglePanel(id) {
        const p = document.getElementById(id); const isOpen = p.style.display === 'flex';
        document.querySelectorAll('.panel').forEach(el => el.style.display = 'none');
        p.style.display = isOpen ? 'none' : 'flex';
        if(id === 'histPanel') renderHistoryUI();
        if(id === 'designPanel') syncDesignUI();
        if(id === 'customPanel') renderCustomList();
    }
    function saveToHistory(eq, res) { historyData.unshift({ eq, res }); if(historyData.length > 20) historyData.pop(); localStorage.setItem('procalc_history_data', JSON.stringify(historyData)); }
    function renderHistoryUI() {
        document.getElementById('historyList').innerHTML = historyData.length ? historyData.map(item => `<div style="background:var(--panel-bg); padding:15px; margin-bottom:5px; border-radius:8px; text-align:right;"><div onclick="insertAtCursor('${item.eq}')">${item.eq}</div><div style="color:var(--accent) !important; font-size:1.4rem;" onclick="insertAtCursor('${item.res}')">${item.res}</div></div>`).join('') : '<p style="text-align:center;">Tomt</p>';
    }
    let isAdvanced = false;
    function toggleAdvanced() {
        isAdvanced = !isAdvanced; document.getElementById('advToggleBtn').classList.toggle('active', isAdvanced);
        const op1 = document.getElementById('op-1'), op2 = document.getElementById('op-2'); 
        if(isAdvanced) { op1.innerHTML = 'sin'; op1.onclick = () => insertAtCursor('Math.sin('); op2.innerHTML = 'cos'; op2.onclick = () => insertAtCursor('Math.cos('); }
        else { op1.innerHTML = '%'; op1.onclick = () => insertAtCursor(' % '); op2.innerHTML = '÷'; op2.onclick = () => insertAtCursor('/'); }
    }

    window.onload = () => { loadDesign(); const savedHist = localStorage.getItem('procalc_history_data'); if(savedHist) historyData = JSON.parse(savedHist); input.focus(); };
</script>
</body>
</html>
