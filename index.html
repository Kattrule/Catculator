<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catculator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --btn-dark: #334155;
            --btn-num: #475569;
            --accent-blue: #38bdf8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text: #ffffff;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Header / Nav */
        .top-bar { background: var(--panel); display: flex; padding: 10px; gap: 8px; }
        .nav-btn { flex: 1; background: var(--btn-dark); border: none; color: var(--accent-blue); padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .nav-btn.active { background: var(--accent-blue); color: var(--bg); }

        /* Display */
        .display-container { padding: 30px 20px; text-align: right; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end; }
        #input-display { font-size: 3rem; border: none; background: transparent; color: var(--text); width: 100%; text-align: right; outline: none; }
        #preview { font-size: 1.5rem; color: var(--text-muted); min-height: 1.5rem; margin-top: 10px; }

        /* Panels */
        .panel { display: none; padding: 15px; flex-shrink: 0; }
        .panel.active { display: block; }

        /* Keyboard Grid */
        .keys-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn { border: none; padding: 20px; border-radius: 12px; font-size: 1.5rem; font-weight: 500; cursor: pointer; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        
        .btn-num { background: var(--btn-num); color: white; }
        .btn-op { background: var(--panel); color: var(--accent-blue); }
        .btn-clear { background: var(--panel); color: var(--accent-red); }
        .btn-equal { background: var(--accent-green); color: var(--bg); grid-column: span 1; }

        /* History List */
        .history-list { max-height: 400px; overflow-y: auto; }
        .history-item { background: var(--panel); padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: right; border-left: 4px solid var(--accent-blue); }
        .hist-eq { color: var(--text-muted); font-size: 0.9rem; }
        .hist-res { color: var(--accent-green); font-size: 1.4rem; font-weight: bold; margin-top: 5px; }

        /* Utility */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="nav-btn" onclick="toggleAdvanced(this)">AVANCERAT</button>
        <button class="nav-btn" onclick="showPanel('keys')">KALK</button>
        <button class="nav-btn" onclick="showPanel('history')">HISTORIK</button>
    </div>

    <div class="display-container">
        <input type="text" id="input-display" placeholder="0" readonly>
        <div id="preview"></div>
    </div>

    <div id="keys-panel" class="panel active">
        <div class="keys-grid" id="main-keys">
            <button class="btn btn-clear" onclick="clearDisplay()">C</button>
            <button class="btn btn-op mode-swap" onclick="addChar(' % ')">%</button>
            <button class="btn btn-op" onclick="smartParenthesis()">( )</button>
            <button class="btn btn-op mode-swap" onclick="addChar('÷')">÷</button>

            <button class="btn btn-num" onclick="addChar('7')">7</button>
            <button class="btn btn-num" onclick="addChar('8')">8</button>
            <button class="btn btn-num" onclick="addChar('9')">9</button>
            <button class="btn btn-op mode-swap" onclick="addChar('×')">×</button>

            <button class="btn btn-num" onclick="addChar('4')">4</button>
            <button class="btn btn-num" onclick="addChar('5')">5</button>
            <button class="btn btn-num" onclick="addChar('6')">6</button>
            <button class="btn btn-op mode-swap" onclick="addChar('-')">-</button>

            <button class="btn btn-num" onclick="addChar('1')">1</button>
            <button class="btn btn-num" onclick="addChar('2')">2</button>
            <button class="btn btn-num" onclick="addChar('3')">3</button>
            <button class="btn btn-op mode-swap" onclick="addChar('+')">+</button>

            <button class="btn btn-num" onclick="addChar('.')">.</button>
            <button class="btn btn-num" onclick="addChar('0')">0</button>
            <button class="btn btn-num" onclick="backspace()">⌫</button>
            <button class="btn btn-equal" onclick="calculate()">=</button>
        </div>
    </div>

    <div id="history-panel" class="panel">
        <div id="history-container" class="history-list"></div>
        <button class="nav-btn" style="width:100%; margin-top:10px; color:var(--accent-red)" onclick="clearHistory()">RENSA ALLT</button>
    </div>

    <script>
        let historyData = JSON.parse(localStorage.getItem('procalc_history')) || [];
        let isAdvanced = false;
        const display = document.getElementById('input-display');
        const preview = document.getElementById('preview');

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function showPanel(name) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(name + '-panel').classList.add('active');
            if(name === 'history') renderHistory();
        }

        function addChar(char) {
            display.value += char;
            livePreview();
        }

        function clearDisplay() {
            display.value = '';
            preview.innerText = '';
        }

        function backspace() {
            display.value = display.value.slice(0, -1);
            livePreview();
        }

        function smartParenthesis() {
            const val = display.value;
            const openCount = (val.match(/\(/g) || []).length;
            const closeCount = (val.match(/\)/g) || []).length;
            const lastChar = val.slice(-1);

            if (openCount > closeCount && (/[0-9)]/.test(lastChar))) {
                addChar(')');
            } else {
                addChar('(');
            }
        }

        function toggleAdvanced(btn) {
            isAdvanced = !isAdvanced;
            btn.classList.toggle('active');
            const ops = document.querySelectorAll('.mode-swap');
            if (isAdvanced) {
                ops[0].innerText = 'sin'; ops[0].onclick = () => addChar('sin(');
                ops[1].innerText = 'cos'; ops[1].onclick = () => addChar('cos(');
                ops[2].innerText = '√'; ops[2].onclick = () => addChar('√(');
                ops[3].innerText = 'π'; ops[3].onclick = () => addChar('π');
                ops[4].innerText = '^'; ops[4].onclick = () => addChar('**');
            } else {
                ops[0].innerText = '%'; ops[0].onclick = () => addChar(' % ');
                ops[1].innerText = '÷'; ops[1].onclick = () => addChar('÷');
                ops[2].innerText = '×'; ops[2].onclick = () => addChar('×');
                ops[3].innerText = '-'; ops[3].onclick = () => addChar('-');
                ops[4].innerText = '+'; ops[4].onclick = () => addChar('+');
            }
        }

        function prepareExpression(str) {
            return str.replace(/×/g, '*').replace(/÷/g, '/').replace(/π/g, Math.PI)
                      .replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(').replace(/√\(/g, 'Math.sqrt(')
                      .replace(/(\d+) % (\d+)/g, "($1*($2/100))");
        }

        function livePreview() {
            try {
                if (!display.value) { preview.innerText = ''; return; }
                let res = eval(prepareExpression(display.value));
                preview.innerText = "= " + Number(res.toFixed(8));
            } catch { preview.innerText = ''; }
        }

        function calculate() {
            try {
                let eq = display.value;
                let res = eval(prepareExpression(eq));
                let formattedRes = Number(res.toFixed(8));
                
                // Spara i historik
                historyData.unshift({ eq, res: formattedRes });
                if (historyData.length > 20) historyData.pop();
                localStorage.setItem('procalc_history', JSON.stringify(historyData));

                display.value = formattedRes;
                preview.innerText = '';
            } catch {
                display.value = 'Fel';
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = historyData.length === 0 ? '<p style="text-align:center; color:var(--text-muted)">Ingen historik</p>' : '';
            historyData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<div class="hist-eq">${item.eq}</div><div class="hist-res">${item.res}</div>`;
                div.onclick = () => { display.value += item.res; showPanel('keys'); };
                container.appendChild(div);
            });
        }

        function clearHistory() {
            historyData = [];
            localStorage.removeItem('procalc_history');
            renderHistory();
        }

        // Kör vid start
        renderHistory();
    </script>
</body>
</html>
